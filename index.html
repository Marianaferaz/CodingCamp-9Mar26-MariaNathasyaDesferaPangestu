<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple productivity dashboard with timer, tasks, and quick links">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="dashboard">
        <!-- Greeting Section -->
        <section class="greeting-section" aria-label="Greeting and time display">
            <div class="time-display" id="time-display" aria-live="polite"></div>
            <div class="date-display" id="date-display"></div>
            <div class="greeting-message" id="greeting-message"></div>
            <div class="name-input-container">
                <input 
                    type="text" 
                    id="user-name-input" 
                    placeholder="Enter your name" 
                    aria-label="Your name for personalized greeting"
                    maxlength="50"
                >
            </div>
        </section>

        <!-- Focus Timer Section -->
        <section class="timer-section" aria-label="Focus timer">
            <h2>Focus Timer</h2>
            <div class="timer-display" id="timer-display" aria-live="polite">25:00</div>
            <div class="timer-controls">
                <button id="timer-start" aria-label="Start timer">Start</button>
                <button id="timer-stop" aria-label="Stop timer">Stop</button>
                <button id="timer-reset" aria-label="Reset timer">Reset</button>
            </div>
            <div class="timer-notification" id="timer-notification" role="alert" aria-live="assertive"></div>
        </section>

        <!-- Task List Section -->
        <section class="tasks-section" aria-label="Task list">
            <h2>Tasks</h2>
            <div class="task-controls">
                <div class="task-input-container">
                    <input 
                        type="text" 
                        id="task-input" 
                        placeholder="Add a new task" 
                        aria-label="New task description"
                        maxlength="200"
                    >
                    <button id="task-add" aria-label="Add task">Add</button>
                </div>
                <div class="task-sort-controls">
                    <label for="task-sort">Sort by:</label>
                    <select id="task-sort" aria-label="Sort tasks">
                        <option value="default">Default</option>
                        <option value="alphabetical">Alphabetical</option>
                        <option value="completion">Completion Status</option>
                    </select>
                </div>
            </div>
            <ul class="task-list" id="task-list" role="list"></ul>
        </section>

        <!-- Quick Links Section -->
        <section class="links-section" aria-label="Quick links">
            <h2>Quick Links</h2>
            <div class="link-input-container">
                <input 
                    type="text" 
                    id="link-name-input" 
                    placeholder="Link name" 
                    aria-label="Link display name"
                    maxlength="50"
                >
                <input 
                    type="url" 
                    id="link-url-input" 
                    placeholder="https://example.com" 
                    aria-label="Link URL"
                >
                <button id="link-add" aria-label="Add link">Add Link</button>
            </div>
            <div class="link-error" id="link-error" role="alert" aria-live="polite"></div>
            <ul class="link-list" id="link-list" role="list"></ul>
        </section>

        <!-- Theme Toggle Section -->
        <section class="theme-section" aria-label="Theme settings">
            <button id="theme-toggle" aria-label="Toggle light and dark mode">
                <span class="theme-icon" aria-hidden="true">🌙</span>
                <span class="theme-text">Toggle Theme</span>
            </button>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
